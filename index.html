<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>數學闖關對戰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100vh;overflow:hidden;
  background:#fff6ec;font-family:'Microsoft JhengHei','微軟正黑體',Arial,sans-serif;
  user-select:none;color:#6b4f3f;}

.screen{display:none;width:100%;height:100vh;flex-direction:column;}
.screen.active{display:flex;}

/* ── START / END ── */
#startScreen,#endScreen{
  align-items:center;justify-content:center;gap:18px;
  background:radial-gradient(ellipse at 50% 38%,#fff3e2 0%,#ffe4cf 55%,#ffd7c4 100%);
  position:relative;overflow-y:auto;padding:20px;
}
.deco{position:absolute;font-size:30px;animation:float 4s ease-in-out infinite;opacity:.85;pointer-events:none;z-index:0;}
.deco:nth-child(1){top:8%;left:10%;}.deco:nth-child(2){top:13%;right:13%;animation-delay:1s;}
.deco:nth-child(3){bottom:16%;left:8%;animation-delay:2s;}.deco:nth-child(4){bottom:13%;right:9%;animation-delay:.5s;}
.deco:nth-child(5){top:40%;left:4%;animation-delay:1.5s;}.deco:nth-child(6){top:36%;right:4%;animation-delay:2.5s;}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-12px) rotate(8deg);}}

.title-text{font-size:clamp(34px,6.5vw,62px);font-weight:900;letter-spacing:3px;text-align:center;
  background:linear-gradient(135deg,#ff8a5c,#ffb04a,#ffd166,#ff8fb1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 3px 6px rgba(255,150,100,.35));}
.animals-row{font-size:clamp(44px,9vw,74px);letter-spacing:10px;}
.rule-box{background:rgba(255,255,255,0.55);border:2px solid #ffcba4;
  border-radius:22px;padding:18px 32px;font-size:clamp(15px,2.6vw,21px);
  color:#7a5a48;text-align:center;line-height:2.1;box-shadow:0 6px 22px rgba(255,170,120,.25);}

.name-row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;}
.name-card{background:rgba(255,255,255,0.6);border-radius:20px;padding:14px 20px;
  display:flex;flex-direction:column;align-items:center;gap:8px;border:2px solid #ffd2b0;}
.name-card.p1{border-color:#ffb98a;}.name-card.p2{border-color:#e6a9d8;}
.name-card .emo{font-size:clamp(38px,7vw,56px);}
.name-card label{font-size:clamp(13px,2vw,17px);font-weight:bold;color:#8a6a55;}
.name-input{font-family:inherit;font-size:clamp(16px,2.6vw,20px);font-weight:bold;
  text-align:center;border:2px solid #ffcda6;border-radius:14px;padding:8px 12px;
  width:clamp(130px,30vw,180px);color:#6b4f3f;background:#fffaf3;outline:none;}
.name-card.p1 .name-input{border-color:#ff9e6d;}
.name-card.p2 .name-input{border-color:#d98fc7;}
.name-input:focus{box-shadow:0 0 0 3px rgba(255,180,120,.35);}

.big-btn{padding:16px 56px;font-size:clamp(19px,3.2vw,26px);border-radius:50px;border:none;
  cursor:pointer;font-family:inherit;font-weight:bold;box-shadow:0 8px 24px rgba(220,150,90,0.35);
  transition:transform .12s;}
.big-btn:active{transform:scale(0.94);}
.btn-start{background:linear-gradient(135deg,#ffb04a,#ffd06a);color:#7a4a20;}
.btn-restart{background:linear-gradient(135deg,#7ee0b0,#6fd6c8);color:#2a5a48;}
.btn-home{background:rgba(255,255,255,0.7);color:#8a6a55;border:2px solid #ffcda6;}
.winner-text{font-size:clamp(30px,5.5vw,56px);font-weight:900;color:#ff8a3c;
  text-shadow:0 3px 16px rgba(255,160,90,.5);text-align:center;}
.final-scores{font-size:clamp(18px,3vw,28px);text-align:center;line-height:2.3;color:#7a5a48;}
.end-anim{font-size:clamp(48px,8vw,80px);animation:bounce .6s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}

/* ── GAME ── */
.player-area{flex:1;display:flex;flex-direction:column;padding:8px 16px 10px;position:relative;overflow:hidden;min-height:0;}
#p2Area{transform:rotate(180deg);background:linear-gradient(to bottom,#fbe4f3,#f6d3ea);border-bottom:4px solid #e09ad1;}
#p1Area{background:linear-gradient(to bottom,#ffe8d2,#ffdab8);border-top:4px solid #ff9e6d;}

.p-header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:2px 0;}
.p-label{font-size:clamp(16px,2.8vw,22px);font-weight:900;display:flex;align-items:center;gap:8px;}
.p1-label{color:#e8682f;}.p2-label{color:#bd5aa6;}
.p-animal{font-size:clamp(26px,4.5vw,36px);}
.p-score{font-size:clamp(30px,5.5vw,48px);font-weight:900;color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,.18);transition:transform .2s;}
#p1Area .p-score{color:#ff7a3c;-webkit-text-stroke:1px #fff;}
#p2Area .p-score{color:#c45fae;-webkit-text-stroke:1px #fff;}
.p-score.bump{transform:scale(1.35);}

.q-wrap{flex:1;display:flex;align-items:center;gap:12px;overflow:hidden;padding:4px 0;min-height:0;}
.q-text{flex:1;font-size:clamp(16px,2.7vw,23px);line-height:1.6;color:#5a4233;font-weight:600;}
.q-fig{flex-shrink:0;width:clamp(150px,26vw,210px);display:flex;align-items:center;justify-content:center;}
.q-fig img{max-width:100%;max-height:30vh;height:auto;border-radius:10px;background:#fff;
  padding:6px;box-shadow:0 3px 10px rgba(150,110,80,.2);}

.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;padding-top:6px;}
.ans-btn{padding:12px 14px;border:2px solid #ffcda6;border-radius:16px;
  background:#fffaf3;color:#5a4233;font-size:clamp(14px,2.3vw,19px);font-weight:600;
  cursor:pointer;text-align:left;font-family:inherit;transition:all .12s;
  display:flex;align-items:center;gap:8px;line-height:1.3;box-shadow:0 2px 6px rgba(180,140,100,.12);}
#p2Area .ans-btn{border-color:#eebfe2;}
.ans-btn:active:not(.disabled){transform:scale(0.95);}
.ans-btn .num{font-weight:900;font-size:1.2em;flex-shrink:0;}
#p1Area .ans-btn .num{color:#ff8a3c;}
#p2Area .ans-btn .num{color:#cc6bb6;}
.ans-btn.picked{border-color:#ffc83d;background:#fff3cf;}
.ans-btn.correct{background:#a6e6bf;border-color:#4fc77f!important;color:#1c6b3e;}
.ans-btn.wrong{background:#ffc0b3;border-color:#ff7a5f!important;color:#9b2c14;}
.ans-btn.show-ans{background:#c8efd6;border-color:#4fc77f;}
.ans-btn.disabled{pointer-events:none;}

/* feedback character + confetti */
.fb-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;z-index:20;opacity:0;transition:opacity .2s;}
.fb-ov.show{opacity:1;}
.fb-card{display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,0.92);border-radius:24px;padding:10px 30px;
  box-shadow:0 8px 30px rgba(0,0,0,.2);animation:pop .3s ease-out;}
.fb-face{font-size:clamp(56px,10vw,96px);line-height:1;animation:wiggle .5s ease-in-out;}
.fb-msg{font-size:clamp(22px,4vw,38px);font-weight:900;}
@keyframes pop{0%{transform:scale(0.3) rotate(-8deg);}80%{transform:scale(1.08);}100%{transform:scale(1);}}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}

.confetti{position:absolute;font-size:22px;pointer-events:none;z-index:30;
  animation:fall var(--dur) linear forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0);}
  100%{opacity:0;transform:translateY(var(--fy)) rotate(var(--rot));}}
.teardrop{position:absolute;font-size:20px;pointer-events:none;z-index:30;
  animation:teardown 1s ease-in forwards;}
@keyframes teardown{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(60px);}}

/* ── MIDDLE BAR ── */
.mid-bar{height:62px;background:#fff1dc;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;flex-shrink:0;border-top:3px solid #ffdcb0;border-bottom:3px solid #ffdcb0;z-index:10;gap:10px;}
.timer{font-size:clamp(24px,4vw,34px);font-weight:900;color:#ff7e4f;
  font-variant-numeric:tabular-nums;flex-shrink:0;min-width:76px;}
.timer.urgent{color:#ff3b30;animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

.race-wrap{flex:1;display:flex;flex-direction:column;gap:4px;align-items:center;padding:0 6px;}
.race-track{width:100%;height:30px;background:#ffe6c8;border-radius:15px;
  border:2px solid #ffd0a0;position:relative;overflow:hidden;}
.track-road{position:absolute;bottom:6px;left:8px;right:8px;height:3px;
  background:repeating-linear-gradient(90deg,rgba(200,140,90,.35) 0,rgba(200,140,90,.35) 7px,transparent 7px,transparent 16px);}
.t-animal{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;
  transition:left .5s cubic-bezier(.34,1.56,.64,1);}
#a1{left:8%;}#a2{left:8%;}
.flag{position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:18px;}
.race-scores{display:flex;align-items:center;gap:10px;font-size:clamp(13px,2.1vw,17px);font-weight:900;}
.s1{color:#e8682f;}.s2{color:#bd5aa6;}.vs{color:#c8a888;font-size:13px;}

.q-nums{font-size:clamp(11px,1.7vw,15px);text-align:right;flex-shrink:0;line-height:1.8;font-weight:bold;}
</style>
</head>
<body>

<!-- ═══ START ═══ -->
<div id="startScreen" class="screen active">
  <span class="deco">🍬</span><span class="deco">🍭</span><span class="deco">🧁</span>
  <span class="deco">🍩</span><span class="deco">⭐</span><span class="deco">🌸</span>
  <div class="title-text">⚔️ 數學闖關對戰 ⚔️</div>
  <div class="animals-row">🦊 VS 🐼</div>
  <div class="name-row">
    <div class="name-card p1">
      <span class="emo">🦊</span>
      <label>玩家 1 名字</label>
      <input class="name-input" id="name1" maxlength="6" placeholder="輸入名字" value="">
    </div>
    <div class="name-card p2">
      <span class="emo">🐼</span>
      <label>玩家 2 名字</label>
      <input class="name-input" id="name2" maxlength="6" placeholder="輸入名字" value="">
    </div>
  </div>
  <div class="rule-box">
    答對 <span style="color:#2aa86a;font-weight:900">+10</span> 能量 　答錯 <span style="color:#ff6b4a;font-weight:900">-5</span> 能量<br>
    各自答各自的，不用等對方！<br>
    倒數 <span style="color:#ff8a3c;font-weight:900">15 分鐘</span>，時間到比能量值！
  </div>
  <button class="big-btn btn-start" onclick="startGame()">🎮 開始對戰！</button>
  <div style="color:#b08a70;font-size:clamp(13px,2vw,16px)">🐾 平板橫放，兩人各坐一側</div>
</div>

<!-- ═══ GAME ═══ -->
<div id="gameScreen" class="screen">
  <div id="p2Area" class="player-area">
    <div class="p-header">
      <div class="p-label p2-label"><span class="p-animal">🐼</span><span id="p2Name">玩家 2</span></div>
      <div class="p-score" id="p2Score">100</div>
    </div>
    <div class="q-wrap">
      <div class="q-text" id="p2QText"></div>
      <div class="q-fig" id="p2QFig"></div>
    </div>
    <div class="ans-grid" id="p2Btns"></div>
    <div class="fb-ov" id="p2FB"><div class="fb-card"><div class="fb-face" id="p2Face"></div><div class="fb-msg" id="p2Msg"></div></div></div>
  </div>

  <div class="mid-bar">
    <div class="timer" id="timerEl">15:00</div>
    <div class="race-wrap">
      <div class="race-track">
        <div class="track-road"></div>
        <div class="t-animal" id="a1">🦊</div>
        <div class="t-animal" id="a2">🐼</div>
        <div class="flag">🏁</div>
      </div>
      <div class="race-scores">
        <span class="s1">🦊 <span id="midS1">100</span></span>
        <span class="vs">VS</span>
        <span class="s2"><span id="midS2">100</span> 🐼</span>
      </div>
    </div>
    <div class="q-nums">
      <div id="p1Qn" style="color:#e8682f">P1 第1題</div>
      <div id="p2Qn" style="color:#bd5aa6">P2 第1題</div>
    </div>
  </div>

  <div id="p1Area" class="player-area">
    <div class="q-wrap">
      <div class="q-text" id="p1QText"></div>
      <div class="q-fig" id="p1QFig"></div>
    </div>
    <div class="ans-grid" id="p1Btns"></div>
    <div class="p-header" style="margin-top:6px">
      <div class="p-label p1-label"><span class="p-animal">🦊</span><span id="p1Name">玩家 1</span></div>
      <div class="p-score" id="p1Score">100</div>
    </div>
    <div class="fb-ov" id="p1FB"><div class="fb-card"><div class="fb-face" id="p1Face"></div><div class="fb-msg" id="p1Msg"></div></div></div>
  </div>
</div>

<!-- ═══ END ═══ -->
<div id="endScreen" class="screen">
  <span class="deco">🎉</span><span class="deco">🎊</span><span class="deco">🏆</span>
  <span class="deco">⭐</span><span class="deco">🌟</span><span class="deco">🎈</span>
  <div class="end-anim" id="endAnim">🦊🐼</div>
  <div class="winner-text" id="winnerEl">--</div>
  <div class="final-scores" id="finalEl"></div>
  <button class="big-btn btn-restart" onclick="startGame()">🔄 再玩一次！</button>
  <button class="big-btn btn-home" onclick="showScreen('startScreen')">🏠 回首頁</button>
</div>

   ═══════════════════════════════════════ */
const NUMS=['①','②','③','④'];
const CONFETTI=['🎉','🎊','⭐','✨','🌟','🍬','🌸'];
const HAPPY=['🥳','😸','🤩','😆','🐰'];
const SAD=['😢','😿','🥺'];
const P=[
  {score:100,pool:[],qi:0,cur:null,locked:false,nt:null,name:'玩家 1'},
  {score:100,pool:[],qi:0,cur:null,locked:false,nt:null,name:'玩家 2'}
];
let GT=null, secs=900;

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;}

function startGame(){
  clearInterval(GT); P.forEach(p=>{clearTimeout(p.nt);p.score=100;p.pool=shuffle(QS);p.qi=0;p.locked=false;});
  // 讀取名字
  const n1=(document.getElementById('name1').value||'').trim()||'玩家 1';
  const n2=(document.getElementById('name2').value||'').trim()||'玩家 2';
  P[0].name=n1; P[1].name=n2;
  document.getElementById('p1Name').textContent=n1;
  document.getElementById('p2Name').textContent=n2;
  secs=900; showScreen('gameScreen'); updateTimer(); updateScores();
  GT=setInterval(()=>{secs--;updateTimer();if(secs<=0){clearInterval(GT);endGame();}},1000);
  loadQ(0); loadQ(1);
}

function updateTimer(){
  const m=0|secs/60,s=secs%60;
  const el=document.getElementById('timerEl');
  el.textContent=`${m}:${s.toString().padStart(2,'0')}`;
  el.className='timer'+(secs<=60?' urgent':'');
}

function loadQ(pi){
  const p=P[pi];
  if(p.qi>=p.pool.length){p.pool=shuffle(QS);p.qi=0;}
  p.cur=p.pool[p.qi]; p.locked=false;
  const pf=pi===0?'p1':'p2', q=p.cur;
  document.getElementById(`${pf}QText`).textContent=q.t;
  document.getElementById(`${pf}QFig`).innerHTML=getFig(q.f);
  document.getElementById(pi===0?'p1Qn':'p2Qn').textContent=`P${pi+1} 第${p.qi+1}題`;
  const con=document.getElementById(`${pf}Btns`);
  con.innerHTML='';
  q.o.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';
    btn.innerHTML=`<span class="num">${NUMS[i]}</span>${opt}`;
    btn.onclick=()=>doAnswer(pi,i);
    con.appendChild(btn);
  });
}

function doAnswer(pi,idx){
  const p=P[pi];
  if(p.locked) return;
  p.locked=true;
  const pf=pi===0?'p1':'p2', q=p.cur, ok=(idx===q.a);
  const btns=[...document.getElementById(`${pf}Btns`).querySelectorAll('.ans-btn')];
  btns.forEach((b,i)=>{b.classList.add('disabled');if(i===q.a)b.classList.add('show-ans');});
  btns[idx].classList.add(ok?'correct':'wrong');
  if(ok){p.score=Math.min(p.score+10,999);showFB(pf,true);confetti(pf);}
  else{p.score=Math.max(p.score-5,0);showFB(pf,false);tears(pf);}
  updateScores();
  p.qi++;
  p.nt=setTimeout(()=>{hideFB(pf);loadQ(pi);},1600);
}

function showFB(pf,ok){
  const o=document.getElementById(`${pf}FB`);
  const face=document.getElementById(`${pf}Face`);
  const msg=document.getElementById(`${pf}Msg`);
  if(ok){
    face.textContent=HAPPY[0|Math.random()*HAPPY.length];
    msg.textContent='答對了！ +10';
    msg.style.color='#2aa86a';
  }else{
    face.textContent=SAD[0|Math.random()*SAD.length];
    msg.textContent='答錯了… -5';
    msg.style.color='#ff6b4a';
  }
  o.classList.add('show');
}
function hideFB(pf){document.getElementById(`${pf}FB`).classList.remove('show');}

function confetti(pf){
  const area=document.getElementById(pf==='p1'?'p1Area':'p2Area');
  for(let i=0;i<22;i++){
    const el=document.createElement('div');el.className='confetti';
    el.textContent=CONFETTI[0|Math.random()*CONFETTI.length];
    el.style.left=(Math.random()*90+5)+'%';
    el.style.top='-6%';
    el.style.fontSize=(16+Math.random()*16)+'px';
    el.style.setProperty('--fy',(180+Math.random()*160)+'px');
    el.style.setProperty('--rot',(Math.random()*720-360)+'deg');
    el.style.setProperty('--dur',(0.9+Math.random()*0.7)+'s');
    area.appendChild(el);setTimeout(()=>el.remove(),1700);
  }
}
function tears(pf){
  const area=document.getElementById(pf==='p1'?'p1Area':'p2Area');
  for(let i=0;i<8;i++){
    const el=document.createElement('div');el.className='teardrop';
    el.textContent='💧';
    el.style.left=(Math.random()*70+15)+'%';
    el.style.top=(Math.random()*30+25)+'%';
    el.style.fontSize=(14+Math.random()*10)+'px';
    el.style.animationDelay=(Math.random()*0.3)+'s';
    area.appendChild(el);setTimeout(()=>el.remove(),1400);
  }
}

function updateScores(){
  [0,1].forEach(i=>{
    const pf=i===0?'p1':'p2';
    const el=document.getElementById(`${pf}Score`);
    el.textContent=P[i].score;el.classList.add('bump');
    setTimeout(()=>el.classList.remove('bump'),300);
  });
  document.getElementById('midS1').textContent=P[0].score;
  document.getElementById('midS2').textContent=P[1].score;
  const tot=Math.max(P[0].score+P[1].score,1);
  document.getElementById('a1').style.left=(8+P[0].score/tot*76)+'%';
  document.getElementById('a2').style.left=(8+P[1].score/tot*76)+'%';
}

function endGame(){
  clearInterval(GT);P.forEach(p=>clearTimeout(p.nt));
  const [s1,s2]=[P[0].score,P[1].score];
  const [n1,n2]=[P[0].name,P[1].name];
  let w='',a='';
  if(s1>s2){w=`🦊 ${n1} 獲勝！`;a='🦊🏆';}
  else if(s2>s1){w=`🐼 ${n2} 獲勝！`;a='🏆🐼';}
  else{w='🤝 平手！';a='🦊🐼';}
  document.getElementById('winnerEl').textContent=w;
  document.getElementById('endAnim').textContent=a;
  document.getElementById('finalEl').innerHTML=
    `<span style="color:#e8682f">🦊 ${n1}：${s1} 分（答${P[0].qi}題）</span><br>
     <span style="color:#bd5aa6">🐼 ${n2}：${s2} 分（答${P[1].qi}題）</span>`;
  showScreen('endScreen');
}
</script>
